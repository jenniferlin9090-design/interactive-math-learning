<!DOCTYPE HTML>
<html>
<head>
<meta charset="utf-8" />
<title>Quadratic Function Interactive Tool</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
}

.container {
    display: flex;
    gap: 20px;
}

.panel {
    flex: 1;
}

canvas {
    border: 1px solid #ccc;
    margin-top: 10px;
}

table {
    border-collapse: collapse;
    width: 100%;
}

td, th {
    border: 1px solid #ccc;
    padding: 5px;
    text-align: center;
}

input {
    width: 100px;
}
</style>
</head>

<body>

<h2>Quadratic Function Interactive Tool</h2>

<div class="container">

<!-- 左：函数输入 -->
<div class="panel">
    <h3>Function Input</h3>
    <p>Example: x*x + 2*x + 1</p>
    <input id="func" value="x*x + 2*x + 1">
    <br><br>
    <button onclick="draw()">Graph</button>
</div>

<!-- 右：表格 -->
<div class="panel">
    <h3>Data Table (x, y)</h3>
    <table id="table">
        <tr><th>x</th><th>y</th></tr>
    </table>
</div>

</div>

<!-- 图像 -->
<canvas id="canvas" width="800" height="450"></canvas>

<script>
// ========== 初始化表格 ==========
const table = document.getElementById("table");

for (let i = 0; i < 10; i++) {
    let row = table.insertRow();
    row.innerHTML = `
        <td><input type="number" id="x${i}"></td>
        <td><input type="number" id="y${i}"></td>
    `;
}

// ========== canvas ==========
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// 坐标中心 + scale
const origin = {x: 400, y: 225};
const scale = 30;

// ========== 转换坐标 ==========
function toCanvas(x, y) {
    return {
        x: origin.x + x * scale,
        y: origin.y - y * scale
    };
}

// ========== 解析函数 ==========
function f(expr, x) {
    return eval(expr.replace(/x/g, `(${x})`));
}

// ========== 画坐标系 ==========
function drawAxis() {
    ctx.strokeStyle = "#aaa";

    // x轴
    ctx.beginPath();
    ctx.moveTo(0, origin.y);
    ctx.lineTo(800, origin.y);
    ctx.stroke();

    // y轴
    ctx.beginPath();
    ctx.moveTo(origin.x, 0);
    ctx.lineTo(origin.x, 450);
    ctx.stroke();
}

// ========== 画函数 ==========
function drawFunction(expr) {
    ctx.beginPath();

    let first = true;

    for (let px = -200; px <= 200; px++) {
        let x = px / 20;
        let y = f(expr, x);

        let p = toCanvas(x, y);

        if (first) {
            ctx.moveTo(p.x, p.y);
            first = false;
        } else {
            ctx.lineTo(p.x, p.y);
        }
    }

    ctx.strokeStyle = "blue";
    ctx.stroke();
}

// ========== 画点 ==========
function drawPoints() {
    for (let i = 0; i < 10; i++) {
        let x = parseFloat(document.getElementById("x" + i).value);
        let y = parseFloat(document.getElementById("y" + i).value);

        if (!isNaN(x) && !isNaN(y)) {
            let p = toCanvas(x, y);

            ctx.beginPath();
            ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
            ctx.fillStyle = "red";
            ctx.fill();
        }
    }
}

// ========== 主函数 ==========
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawAxis();

    let expr = document.getElementById("func").value;

    drawFunction(expr);
    drawPoints();
}

// 初始绘图
draw();
</script>

</body>
</html>
