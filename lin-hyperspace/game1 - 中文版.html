<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>二次函数投篮探究小游戏</title>
  <style>
    :root {
      --ink: #213547;
      --muted: #607086;
      --line: #d9e1ec;
      --panel: #ffffff;
      --court: #fff8ed;
      --accent: #1c7ed6;
      --accent-2: #ef7b45;
      --good: #1f9d55;
      --bad: #d9480f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: linear-gradient(180deg, #f4f8fc 0%, #eef4f1 100%);
    }

    main {
      width: min(1180px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 18px 0 28px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 3vw, 34px);
      letter-spacing: 0;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(82px, 1fr));
      gap: 8px;
      min-width: 280px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.82);
      text-align: center;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .stat strong {
      display: block;
      margin-top: 2px;
      font-size: 22px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 14px;
      align-items: start;
    }

    .court-wrap,
    .controls {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 16px 34px rgba(30, 60, 90, 0.08);
    }

    .court-wrap {
      padding: 10px;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 3 / 2;
      border: 1px solid #bdc9d8;
      border-radius: 6px;
      background: var(--court);
      cursor: crosshair;
    }

    .controls {
      padding: 14px;
    }

    .control-title {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .group {
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }

    .group:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    .label-row output {
      min-width: 84px;
      color: var(--accent);
      text-align: right;
      font-family: Consolas, "Courier New", monospace;
      font-weight: 700;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .number-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .mini {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .mini input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px;
      color: var(--ink);
      font: inherit;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 7px;
      padding: 10px 12px;
      color: #fff;
      background: var(--accent);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      color: var(--ink);
      border: 1px solid var(--line);
      background: #f7fafc;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .formula {
      margin: 12px 0 0;
      padding: 10px;
      border-radius: 7px;
      color: #17324d;
      background: #eef6ff;
      font-family: Consolas, "Courier New", monospace;
      font-size: 14px;
      line-height: 1.5;
    }

    .insight {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .message {
      min-height: 48px;
      margin-top: 12px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fbfcfe;
      font-weight: 700;
      line-height: 1.55;
    }

    .message.good {
      color: var(--good);
      border-color: #b8e6c9;
      background: #f1fbf5;
    }

    .message.bad {
      color: var(--bad);
      border-color: #ffd0bd;
      background: #fff5ef;
    }

    .tasks {
      margin: 10px 0 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      header,
      .layout {
        grid-template-columns: 1fr;
      }

      header {
        display: block;
      }

      .stats {
        margin-top: 12px;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>二次函数投篮探究小游戏</h1>
        <p class="subtitle">调整 y = a(x - h)<sup>2</sup> + k，让篮球沿抛物线飞进篮筐。</p>
      </div>
      <div class="stats" aria-label="游戏数据">
        <div class="stat"><span>命中</span><strong id="score">0</strong></div>
        <div class="stat"><span>尝试</span><strong id="attempts">0</strong></div>
        <div class="stat"><span>命中率</span><strong id="rate">0%</strong></div>
      </div>
    </header>

    <section class="layout">
      <div class="court-wrap">
        <canvas id="gameCanvas" width="900" height="600" aria-label="投篮游戏画布"></canvas>
      </div>

      <aside class="controls">
        <h2 class="control-title">函数调节台</h2>

        <div class="group">
          <div class="label-row">
            <label for="aRange">开口大小 a</label>
            <output id="aOut">-0.0060</output>
          </div>
          <input id="aRange" type="range" min="-0.016" max="-0.001" step="0.0005" value="-0.006">
        </div>

        <div class="group">
          <div class="label-row">
            <label for="hRange">对称轴 h</label>
            <output id="hOut">4.80</output>
          </div>
          <input id="hRange" type="range" min="1.5" max="8.2" step="0.05" value="4.8">
        </div>

        <div class="group">
          <div class="label-row">
            <label for="kRange">顶点高度 k</label>
            <output id="kOut">3.60</output>
          </div>
          <input id="kRange" type="range" min="1.2" max="5.6" step="0.05" value="3.6">

          <div class="number-row">
            <label class="mini">a
              <input id="aInput" type="number" min="-0.016" max="-0.001" step="0.0005" value="-0.006">
            </label>
            <label class="mini">h
              <input id="hInput" type="number" min="1.5" max="8.2" step="0.05" value="4.8">
            </label>
            <label class="mini">k
              <input id="kInput" type="number" min="1.2" max="5.6" step="0.05" value="3.6">
            </label>
          </div>
        </div>

        <div class="buttons">
          <button id="shootBtn" type="button">投篮</button>
          <button id="resetBtn" class="secondary" type="button">重置</button>
        </div>

        <div class="formula" id="formula"></div>
        <div class="insight" id="insight"></div>
        <div class="message" id="message">拖动画布中的蓝色顶点或使用滑块，观察抛物线怎样改变。</div>

        <ol class="tasks">
          <li>让 a 的绝对值变大，观察抛物线变“窄”还是变“宽”。</li>
          <li>改变 h，找出对称轴 x = h 怎样左右移动。</li>
          <li>改变 k，判断顶点和最高点是否一起移动。</li>
        </ol>
      </aside>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const controls = {
      aRange: document.getElementById("aRange"),
      hRange: document.getElementById("hRange"),
      kRange: document.getElementById("kRange"),
      aInput: document.getElementById("aInput"),
      hInput: document.getElementById("hInput"),
      kInput: document.getElementById("kInput"),
      aOut: document.getElementById("aOut"),
      hOut: document.getElementById("hOut"),
      kOut: document.getElementById("kOut"),
      formula: document.getElementById("formula"),
      insight: document.getElementById("insight"),
      message: document.getElementById("message"),
      shootBtn: document.getElementById("shootBtn"),
      resetBtn: document.getElementById("resetBtn"),
      score: document.getElementById("score"),
      attempts: document.getElementById("attempts"),
      rate: document.getElementById("rate")
    };

    const world = {
      width: 10,
      height: 6,
      originX: 70,
      originY: 540,
      scaleX: 76,
      scaleY: 76
    };

    const player = { x: 0.55, y: 0.95 };
    const hoop = { x: 8.35, y: 3.05, width: 0.58, height: 0.15 };
    const state = {
      a: -0.006,
      h: 4.8,
      k: 3.6,
      ball: null,
      animationId: null,
      shooting: false,
      score: 0,
      attempts: 0,
      draggingVertex: false
    };

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function worldToCanvas(x, y) {
      return {
        x: world.originX + x * world.scaleX,
        y: world.originY - y * world.scaleY
      };
    }

    function canvasToWorld(x, y) {
      return {
        x: (x - world.originX) / world.scaleX,
        y: (world.originY - y) / world.scaleY
      };
    }

    function pathY(x) {
      const screenA = state.a * 100;
      return screenA * Math.pow(x - state.h, 2) + state.k;
    }

    function drawBackground() {
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, "#eaf6ff");
      gradient.addColorStop(0.62, "#fff8ed");
      gradient.addColorStop(1, "#f1dfc0");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#ead1a4";
      ctx.fillRect(0, world.originY, canvas.width, canvas.height - world.originY);

      ctx.strokeStyle = "rgba(127, 99, 58, 0.35)";
      ctx.lineWidth = 1;
      for (let x = world.originX; x <= 840; x += world.scaleX) {
        ctx.beginPath();
        ctx.moveTo(x, world.originY);
        ctx.lineTo(x, world.originY + 45);
        ctx.stroke();
      }
    }

    function drawAxes() {
      ctx.save();
      ctx.strokeStyle = "#43556b";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(world.originX, world.originY);
      ctx.lineTo(850, world.originY);
      ctx.moveTo(world.originX, world.originY);
      ctx.lineTo(world.originX, 70);
      ctx.stroke();

      ctx.fillStyle = "#43556b";
      ctx.font = "13px Microsoft YaHei, Arial";
      ctx.textAlign = "center";
      for (let x = 0; x <= 10; x += 1) {
        const p = worldToCanvas(x, 0);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y - 5);
        ctx.lineTo(p.x, p.y + 5);
        ctx.stroke();
        ctx.fillText(String(x), p.x, p.y + 22);
      }

      ctx.textAlign = "right";
      for (let y = 1; y <= 6; y += 1) {
        const p = worldToCanvas(0, y);
        ctx.beginPath();
        ctx.moveTo(p.x - 5, p.y);
        ctx.lineTo(p.x + 5, p.y);
        ctx.stroke();
        ctx.fillText(String(y), p.x - 10, p.y + 4);
      }
      ctx.fillText("x", 862, world.originY + 5);
      ctx.fillText("y", world.originX + 5, 58);
      ctx.restore();
    }

    function drawPlayer() {
      const p = worldToCanvas(player.x, player.y);
      ctx.save();
      ctx.strokeStyle = "#1d4e89";
      ctx.lineWidth = 8;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.arc(p.x, p.y - 56, 15, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(p.x, p.y - 38);
      ctx.lineTo(p.x, p.y + 14);
      ctx.moveTo(p.x, p.y - 18);
      ctx.lineTo(p.x + 32, p.y - 48);
      ctx.moveTo(p.x, p.y + 12);
      ctx.lineTo(p.x - 20, p.y + 44);
      ctx.moveTo(p.x, p.y + 12);
      ctx.lineTo(p.x + 26, p.y + 42);
      ctx.stroke();
      ctx.fillStyle = "#ef7b45";
      ctx.beginPath();
      ctx.arc(p.x + 42, p.y - 58, 11, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawHoop() {
      const rim = worldToCanvas(hoop.x, hoop.y);
      ctx.save();
      ctx.strokeStyle = "#2f4f68";
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(rim.x + 50, rim.y - 100);
      ctx.lineTo(rim.x + 50, world.originY);
      ctx.stroke();

      ctx.fillStyle = "#f8f9fa";
      ctx.strokeStyle = "#66809c";
      ctx.lineWidth = 3;
      ctx.fillRect(rim.x + 17, rim.y - 80, 50, 42);
      ctx.strokeRect(rim.x + 17, rim.y - 80, 50, 42);

      ctx.strokeStyle = "#e03131";
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.ellipse(rim.x + hoop.width * world.scaleX / 2, rim.y, hoop.width * world.scaleX / 2, 8, 0, 0, Math.PI * 2);
      ctx.stroke();

      ctx.strokeStyle = "rgba(80, 80, 80, 0.45)";
      ctx.lineWidth = 1;
      for (let i = 0; i < 5; i += 1) {
        const x = rim.x + i * 10 + 2;
        ctx.beginPath();
        ctx.moveTo(x, rim.y + 6);
        ctx.lineTo(x + 8, rim.y + 46);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawParabola() {
      ctx.save();
      ctx.strokeStyle = "#1c7ed6";
      ctx.lineWidth = 4;
      ctx.beginPath();
      let started = false;
      for (let x = 0; x <= 10; x += 0.04) {
        const y = pathY(x);
        const p = worldToCanvas(x, y);
        if (!started) {
          ctx.moveTo(p.x, p.y);
          started = true;
        } else {
          ctx.lineTo(p.x, p.y);
        }
      }
      ctx.stroke();

      const vertex = worldToCanvas(state.h, state.k);
      ctx.strokeStyle = "rgba(28, 126, 214, 0.55)";
      ctx.setLineDash([8, 8]);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(vertex.x, 70);
      ctx.lineTo(vertex.x, world.originY);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.fillStyle = "#0b7285";
      ctx.beginPath();
      ctx.arc(vertex.x, vertex.y, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#17324d";
      ctx.font = "14px Microsoft YaHei, Arial";
      ctx.fillText(`顶点 (${state.h.toFixed(2)}, ${state.k.toFixed(2)})`, vertex.x + 14, vertex.y - 12);
      ctx.fillText(`对称轴 x = ${state.h.toFixed(2)}`, vertex.x + 14, Math.min(world.originY - 12, vertex.y + 24));
      ctx.restore();
    }

    function drawBall(x, y) {
      const p = worldToCanvas(x, y);
      ctx.save();
      ctx.fillStyle = "#f08c00";
      ctx.strokeStyle = "#8a4b08";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 13, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.strokeStyle = "rgba(120, 64, 8, 0.7)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(p.x - 13, p.y);
      ctx.lineTo(p.x + 13, p.y);
      ctx.moveTo(p.x, p.y - 13);
      ctx.lineTo(p.x, p.y + 13);
      ctx.stroke();
      ctx.restore();
    }

    function drawTargetHint() {
      const center = {
        x: hoop.x + hoop.width / 2,
        y: hoop.y
      };
      const p = worldToCanvas(center.x, center.y);
      ctx.save();
      ctx.strokeStyle = "rgba(31, 157, 85, 0.75)";
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.arc(p.x, p.y, 20, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function render() {
      drawBackground();
      drawAxes();
      drawTargetHint();
      drawParabola();
      drawPlayer();
      drawHoop();
      if (state.ball) {
        drawBall(state.ball.x, state.ball.y);
      } else {
        drawBall(player.x + 0.55, player.y + 0.7);
      }
    }

    function updatePanel() {
      controls.aRange.value = state.a;
      controls.hRange.value = state.h;
      controls.kRange.value = state.k;
      controls.aInput.value = state.a.toFixed(4);
      controls.hInput.value = state.h.toFixed(2);
      controls.kInput.value = state.k.toFixed(2);
      controls.aOut.value = state.a.toFixed(4);
      controls.hOut.value = state.h.toFixed(2);
      controls.kOut.value = state.k.toFixed(2);
      controls.formula.innerHTML = `y = ${state.a.toFixed(4)}(x - ${state.h.toFixed(2)})² + ${state.k.toFixed(2)}`;

      const widthText = Math.abs(state.a) >= 0.01 ? "较窄，球路更陡" : Math.abs(state.a) >= 0.005 ? "适中" : "较宽，球路更平缓";
      controls.insight.textContent = `当前抛物线开口向下；顶点是最高点；a 的绝对值越大，抛物线越窄。现在的形状：${widthText}。`;

      controls.score.textContent = state.score;
      controls.attempts.textContent = state.attempts;
      controls.rate.textContent = state.attempts ? `${Math.round(state.score / state.attempts * 100)}%` : "0%";
      render();
    }

    function setMessage(text, kind = "") {
      controls.message.textContent = text;
      controls.message.className = `message ${kind}`.trim();
    }

    function syncValue(name, value) {
      if (state.shooting) return;
      if (name === "a") {
        state.a = clamp(Number(value), -0.016, -0.001);
      }
      if (name === "h") {
        state.h = clamp(Number(value), 1.5, 8.2);
      }
      if (name === "k") {
        state.k = clamp(Number(value), 1.2, 5.6);
      }
      setMessage("参数已改变。观察蓝色抛物线、顶点和对称轴的位置。");
      updatePanel();
    }

    function checkHit(x, y) {
      const nearX = x >= hoop.x - 0.05 && x <= hoop.x + hoop.width + 0.05;
      const nearY = y >= hoop.y - 0.18 && y <= hoop.y + 0.22;
      return nearX && nearY;
    }

    function shoot() {
      if (state.shooting) return;
      state.shooting = true;
      state.attempts += 1;
      state.ball = { x: 0.55, y: pathY(0.55), t: 0 };
      controls.shootBtn.disabled = true;
      setMessage("篮球正在沿二次函数图像运动...");

      const start = performance.now();
      const duration = 2200;
      let hit = false;

      function step(now) {
        const progress = clamp((now - start) / duration, 0, 1);
        state.ball.x = 0.55 + progress * 9.1;
        state.ball.y = pathY(state.ball.x);
        if (!hit && checkHit(state.ball.x, state.ball.y)) {
          hit = true;
        }
        render();

        if (progress < 1 && state.ball.y > -0.5 && state.ball.y < 7) {
          state.animationId = requestAnimationFrame(step);
          return;
        }

        state.shooting = false;
        controls.shootBtn.disabled = false;
        cancelAnimationFrame(state.animationId);
        if (hit) {
          state.score += 1;
          setMessage("命中！这条抛物线经过了篮筐附近，可以记录当前 a、h、k。", "good");
        } else {
          const targetY = pathY(hoop.x + hoop.width / 2);
          const delta = targetY - hoop.y;
          const hint = delta > 0 ? "球到篮筐处偏高，可以降低 k 或让曲线更弯。" : "球到篮筐处偏低，可以提高 k 或调整 h。";
          setMessage(`未命中。${hint}`, "bad");
        }
        state.ball = null;
        updatePanel();
      }

      state.animationId = requestAnimationFrame(step);
    }

    function resetGame() {
      cancelAnimationFrame(state.animationId);
      Object.assign(state, {
        a: -0.006,
        h: 4.8,
        k: 3.6,
        ball: null,
        animationId: null,
        shooting: false,
        score: 0,
        attempts: 0,
        draggingVertex: false
      });
      controls.shootBtn.disabled = false;
      setMessage("已重置。试着先让顶点靠近篮筐与出手点之间。");
      updatePanel();
    }

    function bindControl(range, input, name) {
      range.addEventListener("input", () => syncValue(name, range.value));
      input.addEventListener("change", () => syncValue(name, input.value));
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          syncValue(name, input.value);
          input.blur();
        }
      });
    }

    function pointerPosition(event) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      return {
        x: (event.clientX - rect.left) * scaleX,
        y: (event.clientY - rect.top) * scaleY
      };
    }

    canvas.addEventListener("pointerdown", (event) => {
      if (state.shooting) return;
      const pos = pointerPosition(event);
      const vertex = worldToCanvas(state.h, state.k);
      const distance = Math.hypot(pos.x - vertex.x, pos.y - vertex.y);
      if (distance <= 24) {
        state.draggingVertex = true;
        canvas.setPointerCapture(event.pointerId);
      }
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!state.draggingVertex || state.shooting) return;
      const pos = pointerPosition(event);
      const point = canvasToWorld(pos.x, pos.y);
      state.h = clamp(point.x, 1.5, 8.2);
      state.k = clamp(point.y, 1.2, 5.6);
      setMessage("正在拖动顶点：h 控制左右位置，k 控制最高点高度。");
      updatePanel();
    });

    canvas.addEventListener("pointerup", (event) => {
      state.draggingVertex = false;
      canvas.releasePointerCapture(event.pointerId);
    });

    bindControl(controls.aRange, controls.aInput, "a");
    bindControl(controls.hRange, controls.hInput, "h");
    bindControl(controls.kRange, controls.kInput, "k");
    controls.shootBtn.addEventListener("click", shoot);
    controls.resetBtn.addEventListener("click", resetGame);

    updatePanel();
  </script>
</body>
</html>
